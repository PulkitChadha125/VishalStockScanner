<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Trading App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body data-page="{{ active_page }}">
  <div class="drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>
  <div class="layout">
    <aside class="drawer" id="app-drawer">
      <div class="drawer__brand">
        <span class="drawer__logo"></span>
        <span class="drawer__title">Trading App</span>
      </div>
      <nav class="drawer__nav" aria-label="Main navigation">
        <a href="{{ url_for('pages.symbol_settings') }}"
           class="drawer__link{% if active_page == 'symbols' %} is-active{% endif %}"
           data-log-label="Nav: Symbol Settings">
          <span class="drawer__icon" aria-hidden="true">&#9881;</span>
          Symbol Settings
        </a>
        <a href="{{ url_for('pages.order_logs') }}"
           class="drawer__link{% if active_page == 'orders' %} is-active{% endif %}"
           data-log-label="Nav: Order Logs">
          <span class="drawer__icon" aria-hidden="true">&#128203;</span>
          Order Logs
        </a>
        <a href="{{ url_for('pages.app_logs') }}"
           class="drawer__link{% if active_page == 'app_logs' %} is-active{% endif %}"
           data-log-label="Nav: App Logs">
          <span class="drawer__icon" aria-hidden="true">&#128196;</span>
          App Logs
        </a>
      </nav>
    </aside>

    <div class="layout__main">
      <button type="button" class="drawer-toggle" id="drawer-toggle" aria-label="Toggle menu">&#9776;</button>
      <div class="app">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="{{ url_for('static', filename='js/app-logger.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
